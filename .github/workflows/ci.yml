name: CI

on:
  push:
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - AGENTS.md
      - CLAUDE.md
      - LICENSE
      - .readthedocs.yaml
      - docs/**
      - docs_legacy/**
      - examples/**
      - .github/ISSUE_TEMPLATE/**
      - .gemini/**
  pull_request:
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - AGENTS.md
      - CLAUDE.md
      - LICENSE
      - .readthedocs.yaml
      - docs/**
      - docs_legacy/**
      - examples/**
      - .github/ISSUE_TEMPLATE/**
      - .gemini/**

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
          # Default OS/Python matrix for 3.9+
          os: [ ubuntu-latest, macos-latest ]
          python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry --version

      - name: Install project (with dev dependencies)
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Verify security dependency versions
        run: |
          poetry run python - <<'PY'
          import sys
          from importlib.metadata import version

          from packaging.version import Version

          installed = {
              package: Version(version(package))
              for package in (
                  'idna',
                  'Pygments',
                  'pytest',
                  'requests',
                  'soupsieve',
                  'twine',
                  'urllib3',
              )
          }

          if sys.version_info[:2] == (3, 9):
              assert Version('2.32.5') <= installed['requests'] < Version('2.33.0')
              assert Version('2.6.3') <= installed['urllib3'] < Version('2.7.0')
              assert Version('8.4.2') <= installed['pytest'] < Version('9')
          else:
              assert installed['requests'] >= Version('2.33.0')
              assert installed['urllib3'] >= Version('2.7.0')
              assert installed['pytest'] >= Version('9.0.3')

          assert installed['idna'] >= Version('3.15')
          assert installed['Pygments'] >= Version('2.20.0')
          assert installed['soupsieve'] >= Version('2.8.4')
          assert installed['twine'] >= Version('6.2.0')

          for package, installed_version in installed.items():
              print(f'{package}=={installed_version}')
          PY

      - name: Decrypt the helper configuration file
        run: ./.github/scripts/decrypt_helper.sh
        env:
          HELPER_DECRYPT_PASSPHRASE: ${{ secrets.HELPER_DECRYPT_PASSPHRASE }}

      - name: Lint and format check with Ruff
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

      - name: Run tests
        run: |
          umask 077
          poetry run pytest --basetemp="${RUNNER_TEMP}/salespyforce-pytest" -q

      - name: Coverage (pytest-cov) and report
        run: |
          umask 077
          poetry run pytest --basetemp="${RUNNER_TEMP}/salespyforce-pytest" --cov-report=xml --cov=salespyforce --cov-fail-under=50 tests/unit tests/integration --color=yes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build sdist and wheel (Poetry)
        run: |
          poetry build
          poetry run twine check dist/*

  bandit:
    name: Bandit (security static analysis)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and project
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          poetry install --with dev --no-interaction --no-ansi
          poetry run python -m pip install --upgrade bandit

      - name: Run Bandit (SARIF output)
        continue-on-error: true
        run: |
          poetry run bandit -r src \
            -f sarif \
            -o bandit.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
